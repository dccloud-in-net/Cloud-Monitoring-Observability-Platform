apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: platform-alerts
  namespace: observability
  labels:
    release: kps
    role: alert-rules
spec:
  groups:
    # ────────────────────────────────────────────────────────────
    #  Cluster / infra health
    # ────────────────────────────────────────────────────────────
    - name: aks.cluster.health
      interval: 30s
      rules:
        - alert: KubeNodeNotReady
          expr: kube_node_status_condition{condition="Ready",status="true"} == 0
          for: 5m
          labels:
            severity: critical
            team: platform
          annotations:
            summary: "Node {{ $labels.node }} is NotReady"
            description: "Node has been NotReady for more than 5 minutes."
            runbook_url: "https://runbooks.local/aks/node-not-ready"

        - alert: KubePodCrashLoopingHigh
          expr: |
            sum by (namespace, pod) (
              rate(kube_pod_container_status_restarts_total[10m])
            ) > 0.1
          for: 10m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} crash-looping"
            description: "Container is restarting > 6 times in the last 10 minutes."

        - alert: KubeMemoryPressure
          expr: kube_node_status_condition{condition="MemoryPressure",status="true"} == 1
          for: 5m
          labels: { severity: warning, team: platform }
          annotations:
            summary: "Node {{ $labels.node }} under memory pressure"

        - alert: KubeDiskPressure
          expr: kube_node_status_condition{condition="DiskPressure",status="true"} == 1
          for: 5m
          labels: { severity: warning, team: platform }
          annotations:
            summary: "Node {{ $labels.node }} under disk pressure"

        - alert: KubeAPIServerErrors
          expr: |
            sum by (verb) (
              rate(apiserver_request_total{code=~"5.."}[5m])
            ) > 1
          for: 10m
          labels: { severity: warning, team: platform }
          annotations:
            summary: "kube-apiserver 5xx rate is elevated"

    # ────────────────────────────────────────────────────────────
    #  OTel pipeline health
    # ────────────────────────────────────────────────────────────
    - name: opentelemetry.pipeline
      interval: 30s
      rules:
        - alert: OTelCollectorDown
          expr: up{job="otel-collector"} == 0
          for: 5m
          labels: { severity: critical, team: observability }
          annotations:
            summary: "OTel Collector is down"
            description: "No collector replica has been scraped in 5 minutes."

        - alert: OTelExporterQueueSaturated
          expr: |
            avg_over_time(otelcol_exporter_queue_size[5m])
              /
            avg_over_time(otelcol_exporter_queue_capacity[5m]) > 0.8
          for: 10m
          labels: { severity: warning, team: observability }
          annotations:
            summary: "OTel exporter queue >80% full"
            description: "Backpressure on the exporter — risk of dropped telemetry."

        - alert: OTelSpansDropped
          expr: rate(otelcol_processor_dropped_spans_total[5m]) > 0
          for: 10m
          labels: { severity: warning, team: observability }
          annotations:
            summary: "OTel is dropping spans"

    # ────────────────────────────────────────────────────────────
    #  Application — golden signals + SLO burn rate
    # ────────────────────────────────────────────────────────────
    - name: app.golden-signals
      interval: 30s
      rules:
        - record: app:http_request_error_ratio:rate5m
          expr: |
            sum by (service_name) (
              rate(http_server_requests_total{status=~"5.."}[5m])
            )
            /
            sum by (service_name) (
              rate(http_server_requests_total[5m])
            )

        - record: app:http_request_latency_p95:5m
          expr: |
            histogram_quantile(
              0.95,
              sum by (service_name, le) (
                rate(http_server_request_duration_seconds_bucket[5m])
              )
            )

        - alert: AppHighErrorRate
          expr: app:http_request_error_ratio:rate5m > 0.05
          for: 10m
          labels: { severity: warning, team: app }
          annotations:
            summary: "{{ $labels.service_name }} error rate >5%"
            description: "5xx ratio over the last 5m exceeds 5%."

        - alert: AppHighLatencyP95
          expr: app:http_request_latency_p95:5m > 1
          for: 10m
          labels: { severity: warning, team: app }
          annotations:
            summary: "{{ $labels.service_name }} p95 latency >1s"

    - name: app.slo.burn-rate
      interval: 30s
      rules:
        # SLO: 99.9% availability. Burn-rate multi-window alerting per SRE workbook.
        - alert: SLOErrorBudgetBurnFast
          expr: |
            (
              sum(rate(http_server_requests_total{status=~"5.."}[5m]))
              /
              sum(rate(http_server_requests_total[5m]))
            ) > (14.4 * 0.001)
            and
            (
              sum(rate(http_server_requests_total{status=~"5.."}[1h]))
              /
              sum(rate(http_server_requests_total[1h]))
            ) > (14.4 * 0.001)
          for: 2m
          labels: { severity: critical, team: app, slo: "availability" }
          annotations:
            summary: "Fast burn: 2% of 30-day error budget in 1h"
            runbook_url: "https://runbooks.local/slo/availability"

        - alert: SLOErrorBudgetBurnSlow
          expr: |
            (
              sum(rate(http_server_requests_total{status=~"5.."}[30m]))
              /
              sum(rate(http_server_requests_total[30m]))
            ) > (6 * 0.001)
            and
            (
              sum(rate(http_server_requests_total{status=~"5.."}[6h]))
              /
              sum(rate(http_server_requests_total[6h]))
            ) > (6 * 0.001)
          for: 15m
          labels: { severity: warning, team: app, slo: "availability" }
          annotations:
            summary: "Slow burn: 5% of 30-day error budget in 6h"
